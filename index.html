<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Secure Download Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-content">
        <h1>Your file is ready</h1>
        <p id="loader">Preparing setup links...</p>
        <div id="status"></div>
        <div id="countdownDisplay" class="countdown">5s</div>
        <div class="fallback-link" id="fallbackContainer"></div>
      </div>
    </div>
  </div>
  <script src="scripts.js"></script>
</body>
</html>
